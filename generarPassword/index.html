<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Contraseñas - Proyecto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="contenedor-aplicacion">
        <h1>Generador de Contraseñas</h1>
        
        <!-- Visualizador de la contraseña -->
        <div class="contenedor-resultado">
            <span id="resultadoContrasena">C0ntr4$eñ4!</span>
        </div>

        <!-- Formulario de configuración -->
        <div class="contenedor-formulario">
            <div class="encabezado-rango">
                <label>Longitud de caracteres</label>
                <span id="valorLongitud">10</span>
            </div>
            
            <input type="range" id="deslizadorLongitud" min="8" max="20" value="10">

            <div class="opciones-configuracion">
                <label><input type="checkbox" id="mayusculas" checked> Incluir Mayúsculas</label>
                <label><input type="checkbox" id="minusculas" checked> Incluir Minúsculas</label>
                <label><input type="checkbox" id="numeros" checked> Incluir Números</label>
                <label><input type="checkbox" id="simbolos"> Incluir Símbolos</label>
            </div>

            <button id="botonGenerar">GENERAR →</button>
        </div>
    </div>
    
</body>
</html>
